services:
  - type: web
    name: findmyhome-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    plan: free          # change to "starter" or higher for no sleep
    envVars:
      - key: MONGODB_URI
        sync: false     # set manually in the Render dashboard — never commit this
      - key: ALLOWED_ORIGINS
        sync: false     # e.g. https://your-frontend.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.11.0"
